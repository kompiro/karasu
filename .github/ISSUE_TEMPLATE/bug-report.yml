name: Bug report
description: Report a bug in karasu (parser, style resolution, SVG renderer, app, CLI, LSP, or VS Code extension)
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "A clear and concise description of the bug"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to reproduce the behavior. A minimal .krs / .krs.style snippet helps a lot."
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened (error messages, screenshots, rendered output, ...)"
    validations:
      required: true

  - type: input
    id: tools-version
    attributes:
      label: "@kompiro/karasu-tools version"
      description: "Output of `npx @kompiro/karasu-tools --version`, or the version pinned in your package.json / VS Code extension"
      placeholder: "0.x.y"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Node.js version, and — if the bug is in the VS Code extension — VS Code version"
      value: |
        - OS:
        - Node.js:
        - VS Code (if applicable):
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Anything else: related Issues, logs, suspected cause, ..."
    validations:
      required: false
