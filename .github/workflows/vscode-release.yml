name: VS Code Extension Release

# Publishes the `packages/vscode` extension to the VS Code Marketplace under
# publisher `karasu-tools` (extension id `karasu-tools.karasu-vscode`).
#
# Manual-only (`workflow_dispatch`) — the extension is released on its own
# cadence, separate from the changesets-driven npm release of the `karasu` CLI
# (`karasu-vscode` is in `.changeset/config.json` `ignore`; see Issue #1316 and
# ADR-20260512-05). The version published is whatever is in
# `packages/vscode/package.json`.
#
# Like `release.yml` guards npm publish on `NPM_TOKEN`, the publish step here is
# guarded on the `VSCE_PAT` secret: without it the job builds and packages the
# .vsix (so the run still validates bundling + `.vscodeignore`) but skips the
# actual publish. This keeps the workflow safe before the human prerequisites
# (publisher created + `VSCE_PAT` configured) are in place.

on:
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Publish to the VS Code pre-release channel"
        type: boolean
        default: false

concurrency:
  group: vscode-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build + package always, so the run validates esbuild bundling
      # (out/server.js present — assert-server-bundled) and `.vscodeignore`
      # even when no PAT is configured.
      - name: Package extension
        run: pnpm --filter karasu-vscode run package

      - name: Check publish prerequisites
        id: prereqs
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::VSCE_PAT secret is not set — built and packaged the .vsix but skipping publish (expected pre-launch; see #1316)."
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
          fi

      # `vsce` reads the PAT from the VSCE_PAT env var. The extension is already
      # bundled into out/, so publish with --no-dependencies and skip the
      # rebuild (the package step above already ran the build).
      - name: Publish to Marketplace
        if: steps.prereqs.outputs.can_publish == 'true'
        working-directory: packages/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ "${{ inputs.pre_release }}" = "true" ]; then
            pnpm exec vsce publish --no-dependencies --pre-release
          else
            pnpm exec vsce publish --no-dependencies
          fi
