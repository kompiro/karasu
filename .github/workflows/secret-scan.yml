name: Secret Scan

# Mechanically scan for committed secrets / tokens / credentials with
# gitleaks. Runs on every PR (diff scan, fast) and on a daily schedule against
# main (full-history scan, catches anything that slipped in). The
# `workflow_dispatch` entry exists so the **launch full-history scan**
# (Issue #1307) can be triggered on-demand before flipping the repo public.
#
# Keep `GITLEAKS_VERSION` in sync with `.devcontainer/Dockerfile`.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    # Daily at 03:17 UTC — odd minute to avoid the top-of-hour rush.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scan mode (diff = current ref only; history = full git history)"
        type: choice
        options:
          - history
          - diff
        default: history

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.21.2"

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # PR / push: shallow is enough — gitleaks scans the diff against
          # the merge base. schedule / workflow_dispatch: need full history.
          fetch-depth: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && 1 || 0 }}

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Determine scan mode
        id: mode
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request|push)
              echo "mode=diff" >> "$GITHUB_OUTPUT"
              ;;
            schedule)
              echo "mode=history" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "mode=${{ inputs.scan_mode }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "mode=diff" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Scan (diff)
        if: steps.mode.outputs.mode == 'diff'
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --exit-code 1

      - name: Scan (full history)
        if: steps.mode.outputs.mode == 'history'
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --redact \
            --no-banner \
            --exit-code 1
