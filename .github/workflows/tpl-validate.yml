name: TPL validate

# Validates docs/test-perspectives frontmatter and the README index on
# PRs that touch TPL paths. Mirrors the structural pattern of
# adr-validate.yml but is *not* a required check yet — start as
# informative-only, promote to required (with a `tpl-validate-skip.yml`
# companion) once the validator has proven stable through real PRs.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/test-perspectives/**"
      - "scripts/tpl/**"
      - "adr.config.json"
      - ".github/workflows/tpl-validate.yml"
  push:
    branches: [main]
    paths:
      - "docs/test-perspectives/**"
      - "scripts/tpl/**"
      - "adr.config.json"
      - ".github/workflows/tpl-validate.yml"

concurrency:
  group: tpl-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: TPL validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TPL frontmatter and README index
        run: pnpm run tpl:validate

      - name: Run validator tests
        run: pnpm run test:scripts
