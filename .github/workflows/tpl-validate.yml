name: TPL validate

# Validates docs/test-perspectives frontmatter and the README index on
# PRs that touch TPL paths. The validator itself lives in the external
# @kompiro/tpl-tools package (see karasu#1357); this workflow just runs
# `tpl validate` against the controlled vocabulary in adr.config.json.
# Still informative-only — not a required check yet.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/test-perspectives/**"
      - "adr.config.json"
      - ".github/workflows/tpl-validate.yml"
  push:
    branches: [main]
    paths:
      - "docs/test-perspectives/**"
      - "adr.config.json"
      - ".github/workflows/tpl-validate.yml"

concurrency:
  group: tpl-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: TPL validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TPL frontmatter and README index
        run: pnpm run tpl:validate
