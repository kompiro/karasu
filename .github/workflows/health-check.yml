name: Health Check

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 09:00 JST (00:00 UTC)
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck (core)
        run: npm run typecheck --workspace=packages/core

      - name: Typecheck (app)
        run: npm run typecheck --workspace=packages/app

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build
