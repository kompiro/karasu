name: ADR validate

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "scripts/adr/**"
      - ".github/workflows/adr-validate.yml"
  push:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "scripts/adr/**"
      - ".github/workflows/adr-validate.yml"

concurrency:
  group: adr-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Validate ADR frontmatter
        run: pnpm run adr:validate

      - name: Run validator tests
        run: pnpm run test:scripts

      - name: Check generated ADR files (effective.md, graph.md, graph/*.md)
        run: pnpm exec tsx scripts/adr/regenerate.ts --check

      - name: Check ADR assumptions against the working tree
        run: pnpm exec tsx scripts/adr/check-assumptions.ts --quiet
