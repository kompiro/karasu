name: ADR validate

# Companion of `adr-validate-skip.yml`. This workflow runs the real ADR
# validator on PRs that touch ADR paths. The skip workflow emits a no-op
# `Validate` job for all other PRs so the Required status named
# `Validate` stays green repository-wide.
#
# Keep the `paths:` list below in sync with `adr-validate-skip.yml`'s
# `paths-ignore:`. If you add a new ADR-related path here, mirror it
# under `paths-ignore:` in the skip workflow.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "adr.config.json"
      - ".github/workflows/adr-validate.yml"
  push:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "adr.config.json"
      - ".github/workflows/adr-validate.yml"

concurrency:
  group: adr-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate ADR frontmatter
        run: pnpm run adr:validate

      - name: Run validator tests
        run: pnpm run test:scripts

      - name: Check generated ADR files (effective.md, graph.md, graph/*.md)
        run: pnpm exec adr regenerate --check

      - name: Check ADR assumptions against the working tree
        run: pnpm exec adr check-assumptions --quiet
