name: Release — Prepare

# Prepare stage of the release pipeline. Manually triggered from the Actions
# tab. Runs `changeset version` (consumes pending changesets → bumps
# versions, writes CHANGELOG, updates the lockfile) and pushes a
# `chore/release-<version>` branch. Open a PR from that branch, review the
# version bumps + CHANGELOG, and squash-merge it — the merge touches
# packages/**/CHANGELOG.md and triggers Release (release.yml) to publish via
# OIDC.
#
# We push a branch rather than open the PR because GitHub Actions PR creation
# is disabled (Issue #1370); click "Compare & pull request" on the pushed
# branch. Opening the PR as a human is also what makes the required checks
# run (a GITHUB_TOKEN push does not trigger other workflows). See
# ADR-20260623-01 and docs/process.md "リリースの流れ".

on:
  workflow_dispatch:

concurrency:
  group: release-prepare
  cancel-in-progress: false

permissions:
  contents: write # push the chore/release-* branch

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # `pnpm version-packages` = `changeset version && pnpm install
      # --lockfile-only`. If no changesets are pending the tree stays clean
      # and we stop without pushing an empty release branch.
      - name: Version and push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm version-packages
          if git diff --quiet && git diff --cached --quiet; then
            echo "::notice::No pending changesets — nothing to release."
            exit 0
          fi
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          BRANCH="chore/release-$VERSION"
          git switch -c "$BRANCH"
          git add -A
          git commit -m "chore: release karasu $VERSION"
          git push -u origin "$BRANCH"
          echo "::notice::Pushed $BRANCH — open a PR and squash-merge it to publish."
