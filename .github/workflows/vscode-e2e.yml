name: VS Code E2E

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: vscode-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  vscode-e2e:
    name: VS Code extension host
    if: contains(github.event.pull_request.labels.*.name, 'vscode-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libgbm1 libxshmfence1 libgtk-3-0 libasound2t64 \
            libxss1 libxkbfile1 libsecret-1-0 xvfb

      - name: Cache VS Code download
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.vscode-test
          key: ${{ runner.os }}-vscode-test-${{ hashFiles('.github/workflows/vscode-e2e.yml', 'packages/vscode-e2e/.vscode-test.mjs') }}
          restore-keys: |
            ${{ runner.os }}-vscode-test-

      - name: Run extension host smoke tests
        run: xvfb-run -a pnpm --filter @karasu-tools/vscode-e2e test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-e2e-logs
          path: |
            packages/vscode-e2e/.vscode-test/user-data/logs/**
            packages/vscode-e2e/out/**
          retention-days: 14

  vscode-webview-e2e:
    name: VS Code WebView (ExTester)
    if: contains(github.event.pull_request.labels.*.name, 'vscode-webview-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Electron + Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libgbm1 libxshmfence1 libgtk-3-0 libasound2t64 \
            libxss1 libxkbfile1 libsecret-1-0 xvfb

      - name: Cache ExTester resources
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            packages/vscode-e2e/test-resources
            ~/.cache/extension-tester
          key: ${{ runner.os }}-extester-${{ hashFiles('.github/workflows/vscode-e2e.yml', 'packages/vscode-e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-extester-

      - name: Run WebView E2E (ExTester)
        run: xvfb-run -a pnpm --filter @karasu-tools/vscode-e2e run test:webview

      - name: Upload ExTester artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-webview-e2e-logs
          path: |
            packages/vscode-e2e/test-resources/**/logs/**
            packages/vscode-e2e/test-resources/screenshots/**
            packages/vscode-e2e/out/**
          retention-days: 14
