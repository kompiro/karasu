name: Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
    paths:
      - "packages/app/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/preview.yml"

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview to Cloudflare Pages
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build (core)
        run: pnpm --filter @karasu-tools/core run build

      - name: Build (app)
        run: pnpm --filter @karasu-tools/app run build

      - name: Deploy Preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/app/dist --project-name=karasu --branch=${{ github.head_ref }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Delete Preview Deployments
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Delete preview deployments for branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          deployment_ids=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/karasu/deployments?env=preview" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | \
            jq -r --arg branch "$BRANCH" '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id')

          if [ -z "$deployment_ids" ]; then
            echo "No preview deployments found for branch: $BRANCH"
            exit 0
          fi

          for id in $deployment_ids; do
            echo "Deleting deployment $id"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/karasu/deployments/${id}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          done
