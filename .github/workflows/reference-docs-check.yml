name: Reference docs check

# Companion of `reference-docs-check-skip.yml`. This workflow runs the real
# reference-docs drift guard (`gen-docs.ts --check`) plus the en/ja spec
# structure guard (`spec-structure-sync.ts`, Issue #1501) plus the guide
# diagram drift guard (`gen-guide-diagrams.ts --check`, Issue #1574) on PRs
# that touch the reference single-source / guide paths. The skip workflow emits a no-op
# `Reference docs` job for all other PRs so a Required status named
# `Reference docs` stays green repository-wide.
#
# Why a dedicated workflow: `ci.yml` has `paths-ignore: docs/**, **/*.md`, so
# a PR that only edits `docs/spec/*.md` (e.g. a hand edit inside a
# `<!-- gen:reference:* -->` region) gets the `ci-skip.yml` stub Check and
# the drift guard never runs in CI for that PR. lefthook catches it locally,
# but a contributor who bypasses lefthook would slip through. Issue #1342.
#
# Keep the `paths:` list below in sync with `reference-docs-check-skip.yml`'s
# `paths-ignore:` and with lefthook's `reference-docs-check` glob.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/spec/**"
      - "docs/concepts.md"
      - "docs/concepts.ja.md"
      - "docs/guide/**"
      - "packages/core/src/builtins/reference-data.ts"
      - "scripts/reference/**"
      - "scripts/guide/**"
      - "scripts/lint/spec-structure-sync.ts"
      - ".github/workflows/reference-docs-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/spec/**"
      - "docs/concepts.md"
      - "docs/concepts.ja.md"
      - "docs/guide/**"
      - "packages/core/src/builtins/reference-data.ts"
      - "scripts/reference/**"
      - "scripts/guide/**"
      - "scripts/lint/spec-structure-sync.ts"
      - ".github/workflows/reference-docs-check.yml"

concurrency:
  group: reference-docs-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reference-docs-check:
    name: Reference docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Reference docs in sync
        run: pnpm exec tsx scripts/reference/gen-docs.ts --check

      - name: en/ja spec heading structure in sync
        run: pnpm run lint:spec-structure-sync

      - name: Guide diagrams in sync
        run: pnpm exec tsx scripts/guide/gen-guide-diagrams.ts --check
