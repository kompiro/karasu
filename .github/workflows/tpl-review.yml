name: TPL deprecation review

# Opens a periodic TPL deprecation review Issue every 6 months
# (April 1 and October 1, 09:00 UTC). Per ADR-driven decision in #1204:
# semi-annual cadence balances signal vs audit cost.
#
# `workflow_dispatch` is the manual escape hatch — used for the bootstrap
# review and for ad-hoc runs (e.g. after a major architectural change).

on:
  schedule:
    # 09:00 UTC on April 1 and October 1.
    - cron: "0 9 1 4,10 *"
  workflow_dispatch:

concurrency:
  group: tpl-review-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  open-review-issue:
    name: Open TPL review Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate review Issue body
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm --silent tpl:review:body > /tmp/tpl-review-body.md

      - name: Compute period label
        id: period
        run: |
          year=$(date -u +%Y)
          month=$(date -u +%m)
          if [ "$month" -le "06" ]; then
            half="H1"
          else
            half="H2"
          fi
          echo "label=${year}-${half}" >> "$GITHUB_OUTPUT"

      - name: Open review Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "TPL deprecation review — ${{ steps.period.outputs.label }}" \
            --label "documentation" \
            --body-file /tmp/tpl-review-body.md
