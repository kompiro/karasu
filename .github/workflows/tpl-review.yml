name: TPL deprecation review

# Opens a periodic TPL deprecation review Issue every Monday at 09:00 UTC.
#
# Cadence is intentionally weekly during rollout: TPL practice is new and
# many entries were backfilled in a single batch, so we want fast feedback
# on which observations actually rot vs. survive. Once the queue stabilizes
# (most weeks → all `keep`), revisit and consider stretching to monthly /
# semi-annual.
#
# `workflow_dispatch` is the manual escape hatch — used for the bootstrap
# review and for ad-hoc runs (e.g. right after a major architectural change).

on:
  schedule:
    # 09:00 UTC every Monday.
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: tpl-review-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  open-review-issue:
    name: Open TPL review Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate review Issue body
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm --silent tpl:review:body > /tmp/tpl-review-body.md

      - name: Compute period label
        id: period
        run: |
          # ISO 8601 week date, e.g. 2026-W19 — unambiguous across years.
          label=$(date -u +%G-W%V)
          echo "label=${label}" >> "$GITHUB_OUTPUT"

      - name: Open review Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "TPL deprecation review — ${{ steps.period.outputs.label }}" \
            --label "documentation" \
            --body-file /tmp/tpl-review-body.md
