name: AT coverage check

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/acceptance/**"
      - "scripts/acceptance/**"
      - ".github/workflows/at-check-coverage.yml"
  push:
    branches: [main]
    paths:
      - "docs/acceptance/**"
      - "scripts/acceptance/**"
      - ".github/workflows/at-check-coverage.yml"

concurrency:
  group: at-check-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADR_TOOLS_READ_TOKEN }}

      - name: Run AT coverage tests
        run: pnpm run at:test

      - name: Check AT automation marker convention
        run: pnpm at:check-coverage --strict
