name: AT coverage check

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/acceptance/**"
      - "scripts/acceptance/**"
      - ".github/workflows/at-check-coverage.yml"
  push:
    branches: [main]
    paths:
      - "docs/acceptance/**"
      - "scripts/acceptance/**"
      - ".github/workflows/at-check-coverage.yml"

concurrency:
  group: at-check-coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AT coverage tests
        run: pnpm run at:test

      - name: Check AT automation marker convention
        run: pnpm at:check-coverage --strict
