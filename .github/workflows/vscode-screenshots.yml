name: VS Code Screenshots

# On-demand generator for the Marketplace screenshots embedded in
# packages/vscode/README.md (Issue #1671). ExTester needs an x86_64
# chromedriver (chrome-for-testing ships no linux-arm64 build), so this cannot
# run on ARM dev machines — it runs here on ubuntu-latest (x86_64) instead.
#
# Trigger manually from the Actions tab. The job uploads the captured PNGs as
# an artifact; download it, review the images by eye (they ship on a public
# listing), then commit them under packages/vscode/images/screenshots/, bump
# packages/vscode/package.json `version`, and re-publish via vscode-release.yml.

on:
  workflow_dispatch:

concurrency:
  group: vscode-screenshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capture:
    name: Capture Marketplace screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Electron + Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libgbm1 libxshmfence1 libgtk-3-0 libasound2t64 \
            libxss1 libxkbfile1 libsecret-1-0 xvfb

      - name: Cache ExTester resources
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            packages/vscode-e2e/test-resources
            ~/.cache/extension-tester
          key: ${{ runner.os }}-extester-${{ hashFiles('.github/workflows/vscode-e2e.yml', 'packages/vscode-e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-extester-

      - name: Capture screenshots
        run: xvfb-run -a pnpm --filter @karasu-tools/vscode-e2e run capture:screenshots

      - name: Upload screenshots
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-marketplace-screenshots
          path: packages/vscode/images/screenshots/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Upload capture diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-screenshots-diagnostics
          path: |
            packages/vscode-e2e/test-resources/**/logs/**
            packages/vscode-e2e/test-resources/screenshots/**
            packages/vscode-e2e/out/**
          retention-days: 14
