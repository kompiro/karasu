name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    # Docs-only changes don't affect lint / typecheck / build / test, so this
    # workflow is filtered out on those PRs. The companion `ci-skip.yml`
    # provides a stub `Check` job for docs-only PRs so the Required status
    # is still satisfied. Keep both filters in sync (Issue #953).
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Knip
        run: pnpm run knip

      - name: Check circular dependencies
        run: pnpm run check:cycles

      - name: License allowlist
        run: pnpm run check:licenses

      # `adr check-assumptions` validates ADR `assumptions:` entries against
      # the real working tree — a code↔ADR consistency check. The companion
      # `adr-validate.yml` runs it too, but is path-filtered to `docs/adr/**`,
      # so it never runs on the code PRs most likely to break an assumption
      # (a code change can invalidate an existing assumption without touching
      # any ADR — see PR #1477). Running it here, in the already-Required
      # `Check` job that fires on code changes, closes that gap. Issue #1480.
      - name: Check ADR assumptions against the working tree
        run: pnpm exec adr check-assumptions --quiet

      # The reference-docs drift guard lives in its own workflow
      # (`reference-docs-check.yml`), mirroring the ADR setup, so it also runs
      # on docs-only PRs that `ci.yml`'s `paths-ignore` filters out. Issue #1342.

      - name: Typecheck (core)
        run: pnpm --filter @karasu-tools/core run typecheck

      - name: Typecheck (app)
        run: pnpm --filter @karasu-tools/app run typecheck

      - name: Typecheck (cli)
        run: pnpm --filter ./packages/cli run typecheck

      - name: Build (core)
        run: pnpm --filter @karasu-tools/core run build

      - name: Test
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      # The vscode extension isn't part of `pnpm run build`. Build it here so
      # its `postbuild` assertion (out/server.js bundled) runs on every PR,
      # not only behind the `vscode-e2e` label. See Issue #1272 / TPL-20260510-15.
      - name: Build (vscode)
        run: pnpm --filter karasu-vscode run build
