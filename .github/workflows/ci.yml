name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Knip
        run: pnpm run knip

      - name: Typecheck (core)
        run: pnpm --filter @karasu-tools/core run typecheck

      - name: Typecheck (app)
        run: pnpm --filter @karasu-tools/app run typecheck

      - name: Typecheck (cli)
        run: pnpm --filter ./packages/cli run typecheck

      - name: Build (core)
        run: pnpm --filter @karasu-tools/core run build

      - name: Test
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build
