name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    # Docs-only changes don't affect lint / typecheck / build / test, so this
    # workflow is filtered out on those PRs. The companion `ci-skip.yml`
    # provides a stub `Check` job for docs-only PRs so the Required status
    # is still satisfied. Keep both filters in sync (Issue #953).
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Knip
        run: pnpm run knip

      - name: Check circular dependencies
        run: pnpm run check:cycles

      - name: License allowlist
        run: pnpm run check:licenses

      # The reference-docs drift guard lives in its own workflow
      # (`reference-docs-check.yml`), mirroring the ADR setup, so it also runs
      # on docs-only PRs that `ci.yml`'s `paths-ignore` filters out. Issue #1342.

      - name: Typecheck (core)
        run: pnpm --filter @karasu-tools/core run typecheck

      - name: Typecheck (app)
        run: pnpm --filter @karasu-tools/app run typecheck

      - name: Typecheck (cli)
        run: pnpm --filter ./packages/cli run typecheck

      - name: Build (core)
        run: pnpm --filter @karasu-tools/core run build

      - name: Test
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      # The vscode extension isn't part of `pnpm run build`. Build it here so
      # its `postbuild` assertion (out/server.js bundled) runs on every PR,
      # not only behind the `vscode-e2e` label. See Issue #1272 / TPL-20260510-15.
      - name: Build (vscode)
        run: pnpm --filter karasu-vscode run build
