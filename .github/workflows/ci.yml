name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Knip
        run: npm run knip

      - name: Typecheck (core)
        run: npm run typecheck --workspace=packages/core

      - name: Typecheck (app)
        run: npm run typecheck --workspace=packages/app

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build
