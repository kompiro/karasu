name: Release

# Changesets-driven release pipeline (publish-only mode, OIDC trusted publishing).
#
# On every push to `main`, `changeset publish` publishes any public package
# whose `package.json` version is not yet on npm. It is a no-op until a
# maintainer merges a "Version Packages" PR (`pnpm changeset version` run
# locally — we keep GitHub Actions' "create and approve pull requests"
# setting OFF, see Issue #1370), so it is safe to run on every push.
#
# Authentication is **npm Trusted Publishing via GitHub OIDC** — no
# `NPM_TOKEN`. npm exchanges the workflow's OIDC token (`id-token: write`)
# for a short-lived publish credential, provided a Trusted Publisher is
# configured for each package on npmjs.com (org `kompiro`, repo `karasu`,
# workflow file `release.yml`). Requires npm >= 11.5.1 and Node >= 22.14.0,
# so we upgrade npm explicitly below. Provenance is generated automatically
# under trusted publishing — no `--provenance` flag / `NPM_CONFIG_PROVENANCE`
# needed. See ADR-20260619-02 (OIDC migration; follows up the token-based
# auth of ADR-20260512-05) and docs/process.md "リリース運用".
#
# Public packages: `karasu` (CLI) and `@karasu-tools/core`. `@karasu-tools/*`
# others, `@karasu-tools/i18n` (private), and `karasu-vscode` are not
# published here (the VS Code extension ships via its own workflow — #1316).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing
  packages: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22" # resolves to the latest 22.x (>= 22.14.0, required for OIDC)
          cache: "pnpm"

      # npm Trusted Publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      # `changeset publish` shells out to this `npm` for the actual publish.
      - name: Upgrade npm to an OIDC-capable version
        run: npm install -g npm@latest

      # The repo `.npmrc` points the `@kompiro` scope at GitHub Packages
      # (authenticated via NODE_AUTH_TOKEN) for the `@kompiro/adr-tools`
      # dev dependency. Publishing to npmjs.org needs no token — it uses OIDC.
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # `pnpm run release` runs `pnpm build && changeset publish`. With a
      # Trusted Publisher configured and `id-token: write` set, npm publishes
      # tokenless via OIDC and attaches provenance automatically. Publishes
      # only versions not already on npm, so this is a no-op between releases.
      - name: Publish to npm
        run: pnpm run release
