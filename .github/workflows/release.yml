name: Release

# Changesets-driven release pipeline (publish-only mode).
#
# On every push to `main`, if there are NO pending changesets (i.e. a
# maintainer has already merged a Version Packages PR that consumed them),
# publish the bumped public packages to npm. When changesets are still
# pending, this workflow is a no-op — the maintainer is expected to run
# `pnpm changeset version` locally and open a regular release PR.
#
# We call `changeset publish` directly rather than using changesets/action.
# The action always runs `changeset version` first (even with `version:`
# omitted) and then tries to open or list a "Version Packages" PR, which
# requires the repo-wide "Allow GitHub Actions to create and approve pull
# requests" setting we keep OFF (see Issue #1370). `changeset publish`
# alone is a no-op when no versions have been bumped, so this step is safe
# to run on every push. When changeset-bot is introduced post-public
# (Issue #1315), we can switch back to the bot-PR flow.
#
# Currently the only public package is `karasu` (the CLI). `@karasu-tools/*`
# and `karasu-vscode` are listed in `.changeset/config.json` `ignore` — the
# VS Code extension is released separately (see Issue #1316).
#
# Follow-ups intentionally out of scope here (tracked on #1315 / docs/process.md):
#   - changeset-bot GitHub App (enable once the repo is public);
#   - npm Trusted Publishing via OIDC (migrate after the first token-based publish).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      # The repo `.npmrc` already points the `@kompiro` scope at GitHub Packages
      # (authenticated via NODE_AUTH_TOKEN). Add the npmjs.org auth line so
      # `changeset publish` can push the public `karasu` package; the token is
      # interpolated from $NPM_AUTH_TOKEN at runtime.
      - name: Configure npm registry auth
        run: echo '//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}' >> "$HOME/.npmrc"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Skip the publish step until the OSS launch prerequisites are in place
      # (npm name reserved + `NPM_TOKEN` secret configured — see Issue #1315
      # and docs/process.md "未対応のフォローアップ"). Without this guard,
      # every push to `main` would fail with `ENEEDAUTH` from `changeset
      # publish`, because the current `packages/cli/package.json` version
      # (0.0.0) is not yet on the registry and `changeset publish` will
      # attempt to push it.
      - name: Check publish prerequisites
        id: prereqs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::NPM_TOKEN secret is not set — skipping publish (expected pre-launch; see #1315)."
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
          fi

      # `pnpm run release` runs `pnpm build && changeset publish`. `changeset
      # publish` will publish any package whose `package.json` version is not
      # yet on npm, so it only does real work after a maintainer merges a
      # `pnpm changeset version` PR.
      - name: Publish to npm
        if: steps.prereqs.outputs.can_publish == 'true'
        run: pnpm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
