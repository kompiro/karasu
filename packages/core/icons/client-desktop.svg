<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <g class="krs-pictogram" transform="translate(6, 4)">
    <!-- monitor frame -->
    <rect x="1" y="3" width="18" height="12" rx="1" fill="none" stroke="{{color}}" stroke-width="1.5"/>
    <!-- title bar -->
    <line x1="1" y1="6.5" x2="19" y2="6.5" stroke="{{color}}" stroke-width="1.2"/>
    <!-- window controls -->
    <circle cx="3" cy="4.8" r="0.6" fill="{{color}}"/>
    <circle cx="5" cy="4.8" r="0.6" fill="{{color}}"/>
    <circle cx="7" cy="4.8" r="0.6" fill="{{color}}"/>
    <!-- content placeholders -->
    <line x1="3" y1="9" x2="13" y2="9" stroke="{{color}}" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="3" y1="11.5" x2="11" y2="11.5" stroke="{{color}}" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <!-- stand -->
    <line x1="6" y1="15" x2="14" y2="15" stroke="{{color}}" stroke-width="1.5"/>
    <line x1="10" y1="15" x2="10" y2="18" stroke="{{color}}" stroke-width="1.2"/>
    <line x1="6.5" y1="18.5" x2="13.5" y2="18.5" stroke="{{color}}" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <text class="krs-label" x="30" y="19" text-anchor="start"/>
  <text class="krs-description" x="8" y="44" text-anchor="start"/>
</svg>
