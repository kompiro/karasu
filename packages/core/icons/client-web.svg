<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <g class="krs-pictogram" transform="translate(6, 4)">
    <!-- browser window -->
    <rect x="1" y="3" width="18" height="16" rx="1.5" fill="none" stroke="{{color}}" stroke-width="1.5"/>
    <!-- tab strip separator -->
    <line x1="1" y1="8" x2="19" y2="8" stroke="{{color}}" stroke-width="1.2"/>
    <!-- traffic-light dots -->
    <circle cx="3" cy="5.5" r="0.7" fill="{{color}}"/>
    <circle cx="5" cy="5.5" r="0.7" fill="{{color}}"/>
    <circle cx="7" cy="5.5" r="0.7" fill="{{color}}"/>
    <!-- address bar -->
    <rect x="3" y="10" width="14" height="2" rx="0.6" fill="{{color}}" opacity="0.4"/>
    <!-- content lines -->
    <line x1="3" y1="14.5" x2="13" y2="14.5" stroke="{{color}}" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="3" y1="16.5" x2="11" y2="16.5" stroke="{{color}}" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  </g>
  <text class="krs-label" x="30" y="19" text-anchor="start"/>
  <text class="krs-description" x="8" y="44" text-anchor="start"/>
</svg>
