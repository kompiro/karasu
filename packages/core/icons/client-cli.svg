<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <g class="krs-pictogram" transform="translate(6, 4)">
    <!-- terminal frame -->
    <rect x="1" y="2" width="18" height="16" rx="1.5" fill="none" stroke="{{color}}" stroke-width="1.5"/>
    <!-- title bar separator -->
    <line x1="1" y1="5.5" x2="19" y2="5.5" stroke="{{color}}" stroke-width="1.2"/>
    <!-- traffic-light dots -->
    <circle cx="3" cy="3.8" r="0.6" fill="{{color}}"/>
    <circle cx="4.8" cy="3.8" r="0.6" fill="{{color}}"/>
    <circle cx="6.6" cy="3.8" r="0.6" fill="{{color}}"/>
    <!-- chevron prompt -->
    <polyline points="3.5,9 5.5,11 3.5,13" fill="none" stroke="{{color}}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- blinking cursor -->
    <rect x="7.5" y="10" width="3.5" height="2" fill="{{color}}"/>
    <!-- second-line input dots -->
    <line x1="3.5" y1="15.5" x2="14" y2="15.5" stroke="{{color}}" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text class="krs-label" x="30" y="19" text-anchor="start"/>
  <text class="krs-description" x="8" y="44" text-anchor="start"/>
</svg>
