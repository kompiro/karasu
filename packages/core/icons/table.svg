<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <g class="krs-pictogram" transform="translate(6, 4)">
    <!-- header row -->
    <rect x="0" y="0" width="20" height="5" rx="1" fill="{{color}}"/>
    <!-- data rows -->
    <rect x="0" y="7" width="20" height="3" rx="0.5" fill="{{color}}" opacity="0.5"/>
    <rect x="0" y="12" width="20" height="3" rx="0.5" fill="{{color}}" opacity="0.5"/>
    <rect x="0" y="17" width="20" height="3" rx="0.5" fill="{{color}}" opacity="0.5"/>
    <!-- column dividers -->
    <line x1="7" y1="0" x2="7" y2="20" stroke="{{color}}" stroke-width="0.5" opacity="0.4"/>
    <line x1="14" y1="0" x2="14" y2="20" stroke="{{color}}" stroke-width="0.5" opacity="0.4"/>
  </g>
  <text class="krs-label" x="30" y="19" text-anchor="start"/>
  <text class="krs-description" x="8" y="44" text-anchor="start"/>
</svg>
