<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <g class="krs-pictogram" transform="translate(6, 4)">
    <!-- puzzle piece: square body with one tab on top and one slot on right -->
    <path d="
      M2 5
      L7 5
      Q7 2 9 2
      Q11 2 11 5
      L16 5
      L16 9
      Q19 9 19 11
      Q19 13 16 13
      L16 17
      L2 17
      Z"
      fill="none" stroke="{{color}}" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- inner accent dot -->
    <circle cx="9" cy="11" r="1.2" fill="{{color}}"/>
  </g>
  <text class="krs-label" x="30" y="19" text-anchor="start"/>
  <text class="krs-description" x="8" y="44" text-anchor="start"/>
</svg>
