<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- karasu logo: 鴉 kanji brand mark with architectural grid treatment -->
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#07090f"/>
  <!-- Subtle grid lines — architectural motif -->
  <line x1="0" y1="42" x2="128" y2="42" stroke="#111827" stroke-width="1"/>
  <line x1="0" y1="84" x2="128" y2="84" stroke="#111827" stroke-width="1"/>
  <line x1="42" y1="0" x2="42" y2="128" stroke="#111827" stroke-width="1"/>
  <line x1="84" y1="0" x2="84" y2="128" stroke="#111827" stroke-width="1"/>
  <!-- Accent border top -->
  <rect x="0" y="0" width="128" height="3" rx="0" fill="#4d8fff" opacity="0.7"/>
  <!-- 鴉 kanji — main mark -->
  <text x="64" y="90" text-anchor="middle" font-family="serif" font-size="72" fill="#dce8ff">鴉</text>
  <!-- "karasu" wordmark below -->
  <text x="64" y="116" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="4" fill="#4d8fff">karasu</text>
</svg>
