pre-push:
  parallel: true
  commands:
    format:
      run: pnpm run format:check
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck
    knip:
      run: pnpm run knip
    adr-validate:
      glob: "docs/adr/*.md"
      run: pnpm run adr:validate
    adr-regenerate-check:
      glob: "{docs/adr/**,scripts/adr/**}"
      run: pnpm exec tsx scripts/adr/regenerate.ts --check
    adr-check-assumptions:
      glob: "{docs/adr/**,scripts/adr/**}"
      run: pnpm exec tsx scripts/adr/check-assumptions.ts --quiet
    at-check-coverage:
      glob: "{docs/acceptance/**,scripts/acceptance/**}"
      run: pnpm exec tsx scripts/acceptance/check-coverage.ts --strict
