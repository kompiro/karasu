pre-push:
  parallel: true
  commands:
    gitleaks:
      # Secret scan before anything reaches origin — the point at which
      # removal becomes costly under the no-history-rewrite policy
      # (SECURITY.md). Mirrors the diff scan in
      # .github/workflows/secret-scan.yml. gitleaks ships in the
      # devcontainer; contributors not using it must install it
      # (https://github.com/gitleaks/gitleaks#installing) — we fail loudly
      # rather than silently skip so the safety net isn't quietly disabled.
      run: |
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "lefthook(pre-push): gitleaks not found on PATH." >&2
          echo "  Install it: https://github.com/gitleaks/gitleaks#installing" >&2
          echo "  (or rebuild the devcontainer, which ships a pinned version)." >&2
          echo "  CI still runs the scan, but please fix this locally." >&2
          exit 1
        fi
        gitleaks detect --source . --redact --no-banner --exit-code 1
    format:
      run: pnpm run format:check
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck
    knip:
      run: pnpm run knip
    check-cycles:
      run: pnpm run check:cycles
    adr-validate:
      glob: "docs/adr/*.md"
      run: pnpm run adr:validate
    adr-regenerate-check:
      glob: "{docs/adr/**,adr.config.json}"
      run: pnpm exec adr regenerate --check
    adr-check-assumptions:
      glob: "{docs/adr/**,adr.config.json}"
      run: pnpm exec adr check-assumptions --quiet
    tpl-validate:
      glob: "{docs/test-perspectives/**,adr.config.json}"
      run: pnpm run tpl:validate
    at-check-coverage:
      glob: "{docs/acceptance/**,scripts/acceptance/**}"
      run: pnpm exec tsx scripts/acceptance/check-coverage.ts --strict
    reference-docs-check:
      # The machine-derived tables in docs/spec/*.md (and the .ja.md
      # counterparts) are generated from reference-data.ts — fail if a hand
      # edit landed inside a `<!-- gen:reference:* -->` region, or the data
      # changed without regenerating. Mirrors the CI step in ci.yml.
      glob: "{docs/spec/**,packages/core/src/builtins/reference-data.ts,scripts/reference/**}"
      run: pnpm exec tsx scripts/reference/gen-docs.ts --check
    concept-adr-refs:
      # The bidirectional reference layer between docs/concepts*.md and the
      # ADR topic vocabulary (Issue #1389) — fail if a concept anchor or a
      # `> Related ADR topics:` annotation drifts from a `> Derives from`
      # back-ref in docs/adr/README.md. The vitest test
      # (scripts/lint/concept-adr-refs.test.ts) mirrors this guard in CI.
      glob: "{docs/concepts.md,docs/concepts.ja.md,docs/adr/README.md,adr.config.json,scripts/lint/concept-adr-refs.ts}"
      run: pnpm run lint:concept-adr-refs
